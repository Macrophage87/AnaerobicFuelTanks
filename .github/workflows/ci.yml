name: CI

# NOTE: no `paths-ignore` on the pull_request trigger — a PR touching only ignored
# paths would never post the required `ci-required` check and would block forever
# under "require branches up to date before merging".
on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read           # least privilege; nothing here writes to the repo

jobs:
  # ------------------------------------------------------------------
  # Connect IQ compile gate (Variant B: untyped Monkey C).
  #
  # The Garmin SDK + device definitions are baked into a prebuilt image, so a
  # stock hosted runner just pulls it — no SDK-Manager / EULA / device download.
  # We invoke monkeyc directly at -l 1 (Gradual): this codebase is untyped, so
  # strict -l 3 would drown in errors, but -l 1 is still a real gate for the
  # crash-class — illegal API in a data field, syntax, symbol resolution.
  #
  # Compile-ONLY on purpose. The image's tester.sh ALSO launches the simulator to
  # run (:test); headless in a plain container that hangs (Qt/xvfb) until the job
  # times out (observed: BUILD SUCCESSFUL, then "Running tests..." stalls 25 min).
  # Issue #28's gate is the compile / type-check; actually EXECUTING (:test) is
  # wired up in #27. We still build with -t so the (:test) sources are compiled.
  #
  # The Connect IQ project lives in ./connectiq (NOT the repo root).
  # ------------------------------------------------------------------
  test:
    name: Compile (${{ matrix.device }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        device: [ edge1050, fenix6pro ]
    container:
      # Pinned by immutable digest (resolved from :latest, SDK 9.2.0). Re-resolve
      # and update when bumping — see the digest snippet in issue #28.
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Compile ${{ matrix.device }} (untyped Monkey C -> -l 1)
        working-directory: connectiq        # monkey.jungle lives here, not the repo root
        run: |
          set -eux
          # Throwaway signing key (same recipe as the repo's build.sh); never leaves CI.
          openssl genrsa -out /tmp/ci_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in /tmp/ci_key.pem -out /tmp/ci_key.der -nocrypt
          mkdir -p bin
          # Same monkeyc invocation the image's tester.sh uses (incl. -t), minus the
          # simulator launch. A ~few-second failure here is a real compile error.
          monkeyc -f monkey.jungle -d "${{ matrix.device }}" -o bin/app.prg -y /tmp/ci_key.der -t -l 1
          echo "Compiled ${{ matrix.device }} OK"

  # ------------------------------------------------------------------
  # Headless (:test) EXECUTION — the crux #28 deferred and #27 stage 3 solves.
  #
  # The compile `test` job above builds with -t but does NOT run the (:test)
  # functions. Here we actually EXECUTE them under a virtual framebuffer.
  #
  # Why not just call the image's tester.sh: tester.sh launches xvfb internally
  # and is the exact path observed to hang ("BUILD SUCCESSFUL, then Running
  # tests... stalls 25 min"). Instead we drive the pieces manually:
  #   1. xvfb-run provides a display;
  #   2. launch the `connectiq` simulator in the BACKGROUND;
  #   3. WAIT for its shell socket to listen (poll the port, not a fixed sleep);
  #   4. monkeydo the -t build and tee stdout to a log;
  #   5. kill the simulator.
  # The whole run is under `timeout` so a hang fails fast instead of stalling to
  # the job timeout. monkeydo can exit 0 even on test failure, so the gate is the
  # PARSED log: require the Run-No-Evil PASSED summary AND no FAILED/ERROR line.
  #
  # BEST-EFFORT and NOT in ci-required. The job is GREEN unless a (:test) genuinely runs
  # and FAILS; it SKIPS green when the headless simulator can't come up (the known crash
  # below), so it doesn't put a spurious red on the board for infra we can't yet fix.
  # Enforced two-implementation equality is provided by the REQUIRED `model-parity`
  # numeric guard — a Python mirror of TankModel cross-checked against the R reference
  # fixtures (issue #27 part C). Runs on ONE device (edge1050); the two-device compile
  # matrix above stays the fast crash gate.
  #
  # KNOWN STATE (headless bring-up, verified from CI logs — remaining work in #61):
  #   ✓ shell pinned to bash (image default is dash: the `/dev/tcp` socket probe needs bash)
  #   ✓ run logic inlined into `bash -c` (an exported function is dropped across the
  #     xvfb-run -> timeout -> bash exec chain)
  #   ✓ HOME repointed at the SDK device data (Actions forces HOME=/github/home, so the
  #     sim otherwise can't load Devices/edge1050/compiler.json and monkeydo hangs)
  #   ✓ simulator launches, its shell socket connects in ~2 s, monkeydo deploys
  #   ✗ the Qt `simulator` binary then SEGFAULTS ~13 s in, right after "SetLayout":
  #       /connectiq/bin/connectiq: Segmentation fault (core dumped) "$MB_HOME"/simulator
  #     Forcing software GL (LIBGL_ALWAYS_SOFTWARE / llvmpipe / QT_OPENGL=software) did NOT
  #     change it, so it is not the GL path (those env vars were removed as ineffective).
  #     This is a native Qt-under-Xvfb crash in this image that needs a core-dump backtrace /
  #     Qt platform-plugin investigation in the actual container (not fixable by blind CI
  #     iteration). Until then the suite is enforced numerically by `model-parity`. Root-cause
  #     + the promotion checklist (harden the log gate, then add to ci-required.needs) are
  #     tracked in #61.
  # ------------------------------------------------------------------
  ciq-test:
    name: CIQ (:test) headless (best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f
      # #61 diagnostics: allow gdb to attach to the (sibling) simulator process for a crash
      # backtrace. The default runner has YAMA ptrace_scope=1 with no CAP_SYS_PTRACE, so a
      # sibling `gdb -p` is denied ("Inappropriate ioctl for device"). Diagnostic-only — the
      # job stays best-effort and out of ci-required.
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Build -t test PRG (edge1050)
        working-directory: connectiq
        run: |
          set -eux
          openssl genrsa -out /tmp/ci_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER -in /tmp/ci_key.pem -out /tmp/ci_key.der -nocrypt
          mkdir -p bin
          monkeyc -f monkey.jungle -d edge1050 -o bin/app-test.prg -y /tmp/ci_key.der -t -l 1
      - name: Install a GTK theme + settings schemas for the sim (#61 L0 — trialed, falsified; L1 substrate)
        # #61 L0 fix candidate: the minimal image ships no GTK theme and no settings backend, and
        # PR #81's backtrace put the startup SIGSEGV in the GTK path (frame #17 gtk_main; a NULL
        # style-provider assertion), so this installs the full theme + schemas stack, compiles the
        # glib schemas, and the run step reads schema defaults through the in-memory gsettings backend
        # (GSETTINGS_BACKEND=memory) — dconf-gsettings-backend is deliberately NOT installed (one
        # lever, not two, so the run isolates the theme+schemas variable).
        #
        # RESULT — L0 was FALSIFIED by PR #84's CI run: with this whole stack + GTK_THEME +
        # GSETTINGS_BACKEND=memory in the run path, the sim STILL segfaulted under real Xvfb, the NULL
        # style-provider assertion still fired (x3), and (:test) did not run (gate SKIPped). The stack
        # is RETAINED as (a) a reproducible negative baseline and (b) substrate for L1 (dbus-run-session,
        # a real session bus in place of the memory backend) — the next lever, tracked as a separate PR.
        # Best-effort with per-command timeouts so an apt stall can't ride the 15-min job cap.
        shell: bash
        run: |
          set -eux
          timeout 180 apt-get update -y || true
          timeout 240 apt-get install -y --no-install-recommends \
            libgtk-3-0 libgtk-3-common gnome-themes-extra adwaita-icon-theme \
            librsvg2-2 librsvg2-common gsettings-desktop-schemas || true
          timeout 60 glib-compile-schemas /usr/share/glib-2.0/schemas 2>/dev/null || true
      - name: Run (:test) headless under xvfb
        working-directory: connectiq
        # The image's default shell is dash (sh); this step uses the bash `/dev/tcp` socket
        # probe below, so pin bash explicitly.
        shell: bash
        env:
          DEVICE: edge1050
          SIM_PORT: "1234"      # Connect IQ simulator shell port monkeydo connects to
          RUN_TIMEOUT: "300"
          GTK_THEME: "Adwaita"          # #61 L0: give the startup GTK dialog a concrete theme
          GSETTINGS_BACKEND: "memory"   # #61 L0: schema defaults without a dbus/dconf session bus
          NO_AT_BRIDGE: "1"             # #61 L0: don't reach for the a11y bus (absent headless)
        run: |
          set -eux
          LOG=/tmp/ciq-test.log
          : > "$LOG"

          # GitHub Actions forces HOME=/github/home for container steps, but the simulator
          # looks for device data under $HOME/.Garmin/ConnectIQ/Devices — which the image
          # installs under the build user's ORIGINAL home. Without this the sim logs
          # "Failed to load .../Devices/edge1050/compiler.json" and monkeydo hangs. Point
          # HOME at wherever edge1050's compiler.json actually lives. (monkeyc in the compile
          # job is unaffected — it resolves devices via the SDK path, not $HOME.)
          DEV_JSON="$(find / -path '*/.Garmin/ConnectIQ/Devices/edge1050/compiler.json' 2>/dev/null | head -1 || true)"
          if [ -n "$DEV_JSON" ]; then
            export HOME="${DEV_JSON%%/.Garmin/*}"
            echo "using HOME=$HOME (device data at $DEV_JSON)"
          else
            echo "WARNING: edge1050 device data not found under any /.Garmin; sim will likely fail" >&2
          fi

          # The simulator-run logic is passed INLINE to `bash -c` (not as an exported
          # function): export -f + `bash -c funcname` does not survive the
          # xvfb-run -> timeout -> bash exec chain (BASH_FUNC_* is dropped), so the
          # function came back "command not found". DEVICE/SIM_PORT reach the inner
          # bash via the exported `env:` vars; LOG is a fixed path.
          xvfb-run -a -s "-screen 0 1280x1024x24" \
            timeout "${RUN_TIMEOUT}" bash -c '
              set -eux
              # Launch the simulator in the background under the xvfb display.
              connectiq >/tmp/sim.log 2>&1 &
              SIM_PID=$!
              # Wait (bounded) for the sim shell socket to listen — not a fixed sleep.
              SOCK_UP=0
              for i in $(seq 1 60); do
                if (exec 3<>"/dev/tcp/127.0.0.1/${SIM_PORT}") 2>/dev/null; then
                  exec 3>&- 3<&- || true
                  echo "simulator socket up after ${i}s"
                  SOCK_UP=1
                  break
                fi
                if ! kill -0 "$SIM_PID" 2>/dev/null; then
                  echo "simulator process exited before opening a socket" >&2
                  cat /tmp/sim.log >&2 || true
                  exit 1
                fi
                sleep 1
              done
              # Socket-exhaustion bail: never listened within the window — do not hand a dead
              # port to monkeydo (which would then block until the outer timeout).
              if [ "$SOCK_UP" != "1" ]; then
                echo "simulator socket never came up within the wait window" >&2
                cat /tmp/sim.log >&2 || true
                kill "$SIM_PID" 2>/dev/null || true
                exit 1
              fi
              # Deploy + run the (:test) build; -t runs the test harness.
              monkeydo bin/app-test.prg "${DEVICE}" -t 2>&1 | tee /tmp/ciq-test.log
              kill "$SIM_PID" 2>/dev/null || true
              wait "$SIM_PID" 2>/dev/null || true
            ' || echo "run_tests exited non-zero (timeout or sim error)"

          # #61 cleanup: if `timeout` fired, the backgrounded sim can orphan the inner bash -c —
          # make sure no simulator/connectiq/Xvfb child outlives this step.
          pkill -9 -x simulator 2>/dev/null || true
          pkill -9 -x connectiq 2>/dev/null || true
          pkill -9 -x Xvfb 2>/dev/null || true

          echo "----- captured test log -----"
          cat "$LOG" || true
          echo "----- simulator log -----"
          cat /tmp/sim.log 2>/dev/null || true
          echo "-----------------------------"

          # Three outcomes, distinguished so this best-effort job is GREEN unless a test
          # genuinely fails (monkeydo exits 0 even on failure, so parse the log, not $?):
          #   1. PASSED + no FAILED/ERROR   -> success (the suite ran and passed).
          #   2. the suite actually ran and reported FAILED/ERROR -> real failure, exit 1.
          #   3. the sim never produced test output (headless segfault / launch failure /
          #      hang) -> SKIP, exit 0. This is the known, documented headless-sim crash
          #      (see job header); failing the board on infra we can't yet fix would be
          #      noise. Equality is still enforced by the required `model-parity` job.
          # #61 hardened gate — three DISTINCT outcomes, PASS anchored on an observed==expected
          # count (not a bare "PASSED" substring, which a single per-test line can satisfy mid-crash):
          #   1. no FAILED/ERROR AND observed PASSED count >= the number of (:test) cases in source
          #      -> the whole suite ran and passed                     -> exit 0
          #   2. the suite reported FAILED/ERROR                       -> a test genuinely failed -> exit 1
          #   3. neither (segfault / hang / truncated run: fewer PASSED than expected, no error)
          #      -> SKIP, exit 0 (the known headless-sim crash; equality still enforced by the
          #      required model-parity job).
          # CRITICAL (promotion guardrail): a no-output segfault MUST land in (3), never in (2) —
          # this hardening changed PASS PRECISION only, not the skip disposition. FAILED/ERROR stay
          # case-sensitive + word-bounded so benign summary text ("Errors: 0") can't false-fail.
          # EXPECTED is derived from source so adding a (:test) can't silently leave a stale gate.
          # (Anchoring PASS on the terminal Run-No-Evil summary STRING is deferred until the sim
          # actually runs and the real marker can be pinned against captured output — see #61.)
          # Count (:test) annotations robustly: recurse (a .mc in a subdir counts), allow leading
          # indentation, and match combined forms like `(:test :debug)` — an UNDERCOUNT would lower
          # the pass threshold, so this errs toward matching. (A source-vs-gate unit check is a hard
          # precondition before this job is ever promoted to ci-required — see #61.)
          EXPECTED="$(grep -rhoE '^[[:space:]]*\(:test\b' source | wc -l | tr -d ' ')"
          PASSES="$(grep -Ec '\bPASSED\b' "$LOG" || true)"
          FAILS="$(grep -Ec '\b(FAILED|ERROR)\b' "$LOG" || true)"
          echo "gate: expected (:test) cases=${EXPECTED:-0}  observed PASSED=${PASSES:-0}  FAILED/ERROR=${FAILS:-0}"
          if [ "${FAILS:-0}" -gt 0 ]; then
            echo "::error::(:test) reported FAILED/ERROR — a test genuinely failed"
            exit 1
          fi
          if [ "${EXPECTED:-0}" -gt 0 ] && [ "${PASSES:-0}" -ge "${EXPECTED:-0}" ]; then
            echo "CIQ (:test) suite passed headless (${PASSES}/${EXPECTED} cases)"
            exit 0
          fi
          echo "::warning::headless simulator did not run the full (:test) suite (${PASSES:-0}/${EXPECTED:-0} cases passed; known Qt segfault under Xvfb — see job header). Skipping — model equality is enforced by the required model-parity job."
          exit 0

      # #61 diagnostics — root-causes the post-SetLayout SIGSEGV. Best-effort and NON-FATAL
      # (set +e / exit 0 / if: always()), so it can never fail this best-effort job or the board;
      # output goes to the step log (no artifact action to pin). Attaches gdb to the REAL sim
      # process (reproducing the connectiq + monkeydo flow) to capture the crash backtrace, and
      # probes the offscreen Qt platform (which bypasses X11/xcb) as a candidate-fix signal.
      - name: Diagnose the headless simulator crash (best-effort, non-fatal)
        if: ${{ always() }}
        working-directory: connectiq
        shell: bash
        env:
          DEVICE: edge1050
          SIM_PORT: "1234"
          GTK_THEME: "Adwaita"          # #61 L0: same env as the run step so the probes test the fix
          GSETTINGS_BACKEND: "memory"
          NO_AT_BRIDGE: "1"
        run: |
          set +e
          echo "::group::install gdb + GTK theme/schemas + dbus (per-command timeouts so a stall can't ride the job cap)"
          timeout 180 apt-get update -y >/dev/null 2>&1 || true
          timeout 240 apt-get install -y gdb adwaita-icon-theme gnome-themes-extra \
            libgtk-3-common librsvg2-2 librsvg2-common gsettings-desktop-schemas \
            dbus-x11 dconf-gsettings-backend >/dev/null 2>&1 || true
          timeout 60 glib-compile-schemas /usr/share/glib-2.0/schemas >/dev/null 2>&1 || true
          dbus-uuidgen --ensure 2>/dev/null || true
          # #61 L1 (DIAGNOSTIC-ONLY): the run path keeps L0's in-memory backend; here we ALSO trial the
          # real dbus-run-session + dconf backend (group 2 below runs under $DBUS_WRAP with
          # GSETTINGS_BACKEND unset) purely to capture its backtrace. RESULT: FALSIFIED — under dbus/dconf
          # the sim segfaults at the IDENTICAL post-SetLayout point as L0 (memory), so the crash is NOT
          # gated on the gsettings backend. Kept as a diagnostic capture only and NEVER in the run path: a
          # falsified, non-substrate wrapper must not ride every future ciq-test run (see #61 re-diagnosis).
          DBUS_WRAP=""; command -v dbus-run-session >/dev/null 2>&1 && DBUS_WRAP="dbus-run-session --"
          command -v gdb >/dev/null 2>&1 || echo "gdb unavailable; backtrace will be skipped"
          echo "::endgroup::"
          # NOTE: no -dbgsym/ddebs step. PR #84's run empirically proved it a no-op HERE — the crash
          # site is inside the stripped, closed-source Garmin `simulator` binary, which has no public
          # symbol package, so thread-1 frames stayed ?? () even with libgtk-3/glib -dbgsym installed
          # (even the libglib frame stayed unresolved). gdb below still yields the shared-lib map and
          # whatever partial frames resolve, but the crash frame is NOT nameable via this route.
          DEV_JSON="$(timeout 60 find / -path '*/.Garmin/ConnectIQ/Devices/edge1050/compiler.json' 2>/dev/null | head -1 || true)"
          [ -n "$DEV_JSON" ] && export HOME="${DEV_JSON%%/.Garmin/*}"
          SIMBIN="$(timeout 60 find / -type f -name simulator -perm -u+x 2>/dev/null | head -1 || true)"
          echo "simulator binary: ${SIMBIN:-<not found>}"

          # (1) The crash reproduces at STARTUP (PR #81's run showed the standalone offscreen sim
          # segfaulting with no monkeydo), so launch the sim AS gdb's CHILD via `gdb --args` — a
          # PARENT attach is YAMA-exempt, yielding a backtrace even without CAP_SYS_PTRACE. Run under
          # offscreen (no X11 needed). `thread apply all bt full` because Qt is multithreaded.
          echo "::group::(1) gdb --args bare-sim backtrace (parent attach; offscreen; YAMA-exempt)"
          if command -v gdb >/dev/null 2>&1 && [ -n "${SIMBIN:-}" ]; then
            QT_QPA_PLATFORM=offscreen QT_DEBUG_PLUGINS=1 timeout 90 gdb -batch -nx \
              -ex "set pagination off" -ex "run" \
              -ex "printf \"\\n===== BACKTRACE (all threads) =====\\n\"" -ex "thread apply all bt full" \
              -ex "printf \"\\n===== SHARED LIBS =====\\n\"" -ex "info sharedlibrary" \
              -ex "quit" --args "$SIMBIN" 2>&1 | tail -400
          else
            echo "no gdb or sim binary; skipping"
          fi
          echo "::endgroup::"

          # (2) Also catch it in the REAL connectiq + monkeydo flow. Here the sim is a SIBLING of
          # gdb, so this attach needs the job's --cap-add=SYS_PTRACE (added to container.options).
          # #61 L1 diagnostic-only: run under $DBUS_WRAP with GSETTINGS_BACKEND UNSET (env -u) so this
          # capture exercises the dbus/dconf backend (not the run path's memory backend). The captured
          # backtrace is the identical post-SetLayout segfault -> L1 falsified, crash not backend-gated.
          echo "::group::(2) gdb attach in the real connectiq+monkeydo flow, dbus/dconf backend (needs SYS_PTRACE cap)"
          QT_DEBUG_PLUGINS=1 timeout 150 env -u GSETTINGS_BACKEND xvfb-run -a -s "-screen 0 1280x1024x24" $DBUS_WRAP bash -c '
            connectiq >/tmp/sim.diag.log 2>&1 &
            for i in $(seq 1 40); do SIMPID=$(pgrep -x simulator 2>/dev/null || true); [ -n "$SIMPID" ] && break; sleep 0.5; done
            echo "sim pid: ${SIMPID:-none}"
            if command -v gdb >/dev/null 2>&1 && [ -n "${SIMPID:-}" ]; then
              gdb -batch -nx -p "$SIMPID" \
                -ex "set pagination off" -ex "handle SIGSEGV stop print" -ex "continue" \
                -ex "printf \"\\n===== BACKTRACE (all threads) =====\\n\"" -ex "thread apply all bt full" \
                -ex "printf \"\\n===== SHARED LIBS =====\\n\"" -ex "info sharedlibrary" \
                -ex "detach" -ex "quit" 2>&1 &
              GDBPID=$!
              sleep 3
              monkeydo bin/app-test.prg "${DEVICE}" -t >/tmp/monkeydo.diag.log 2>&1 || true
              wait "$GDBPID" 2>/dev/null || true
            else
              echo "no sim pid or no gdb — see the Qt plugin log below"
            fi
          ' 2>&1 | tail -300
          echo "----- sim.diag.log (Qt plugin loading, tail) -----"; tail -60 /tmp/sim.diag.log 2>/dev/null || true
          echo "----- monkeydo.diag.log (tail) -----"; tail -40 /tmp/monkeydo.diag.log 2>/dev/null || true
          echo "----- ciq-test.log from the run step (tail) -----"; tail -40 /tmp/ciq-test.log 2>/dev/null || true
          pkill -9 -x simulator 2>/dev/null || true; pkill -9 -x connectiq 2>/dev/null || true; pkill -9 -x Xvfb 2>/dev/null || true
          echo "::endgroup::"

          # (3) With-theme cross-check for the GTK NULL style-provider clue PR #81's offscreen run
          # surfaced (Gtk-CRITICAL _gtk_style_provider_private_get_settings). L0 (the theme+schemas
          # stack + GTK_THEME/GSETTINGS_BACKEND) is applied in the RUN step, and PR #84's run
          # FALSIFIED it: the sim still segfaulted under real Xvfb with the full stack, and the NULL
          # style-provider assertion still fired. This probe stays as a cheap offscreen cross-check —
          # the next lever is L1 (dbus-run-session), tracked as a separate PR, not group (1).
          echo "::group::(3) GTK-theme cross-check probe (offscreen + GTK_THEME=Adwaita)"
          if [ -n "${SIMBIN:-}" ]; then
            GTK_THEME=Adwaita QT_QPA_PLATFORM=offscreen timeout 30 "$SIMBIN" >/tmp/sim.gtk.log 2>&1 &
            GPID=$!; sleep 10
            if kill -0 "$GPID" 2>/dev/null; then
              echo "GTK probe: sim alive OFFSCREEN — but the run step (same theme+schemas stack) still segfaulted under real Xvfb, so this is an offscreen/Xvfb difference, not the fix. Next lever: L1 (dbus-run-session)."
            else
              echo "GTK probe: sim still exited — the GTK theme+schemas stack is not the fix (L0 falsified this run; see group 1). Next lever: L1 (dbus-run-session)."
            fi
            kill -9 "$GPID" 2>/dev/null || true
            tail -60 /tmp/sim.gtk.log 2>/dev/null || true
          else
            echo "simulator binary not located; skipping GTK probe"
          fi
          echo "::endgroup::"
          pkill -9 -x simulator 2>/dev/null || true; pkill -9 -x Xvfb 2>/dev/null || true
          exit 0

  # ------------------------------------------------------------------
  # R Shiny calibration tool — syntax gate (parse) + advisory lint.
  # parse() needs no packages (unlike source(), which would try to load FITfileR
  # / shiny), so it runs clean on a stock R install.
  # ------------------------------------------------------------------
  r-lint:
    name: R parse + lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      # Deploy-manifest freshness: fail if tools/calibrate/manifest.json no longer
      # matches the committed files (a git-backed Posit Connect deploy would ship a
      # manifest describing a different app.R than served). Package-free (jq+md5sum),
      # so it runs before R is even installed. This job is in ci-required.needs.
      - name: Deploy manifest freshness (checksums match committed files)
        run: ./scripts/check_calibrate_manifest.sh tools/calibrate/manifest.json
      - name: Install R
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core
      - name: Parse (syntax gate)
        run: |
          Rscript -e 'invisible(parse("tools/calibrate/app.R")); invisible(parse("tools/calibrate/deploy.R")); cat("R parse OK\n")'
      - name: lintr (advisory)
        continue-on-error: true
        run: |
          Rscript -e 'if (!requireNamespace("lintr", quietly = TRUE)) install.packages("lintr", repos = "https://cloud.r-project.org"); lintr::lint_dir("tools/calibrate")'

  # ------------------------------------------------------------------
  # R model unit tests (testthat) for the pure numeric + FIT-decoder functions
  # extracted into tools/calibrate/R/model.R. Runs with base R + testthat only —
  # no FITfileR/shiny/network/device. testthat comes from the Ubuntu package
  # (r-cran-testthat, a prebuilt binary), avoiding source-compile / R-version
  # mismatch. Required (in ci-required.needs).
  # ------------------------------------------------------------------
  r-test:
    name: R model tests (testthat)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Install R + testthat (Ubuntu binaries)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core r-cran-testthat
      - name: Run model unit tests
        run: Rscript tools/calibrate/tests/run_tests.R
      - name: Cross-check fixtures are fresh (regenerate from R; expect no diff)
        # Freshness gate for the model-parity guard: the committed reference fixtures must
        # match what the CURRENT R model produces. Regenerate and fail if anything changed —
        # otherwise an R-side model edit with stale fixtures would let model-parity false-pass.
        run: |
          set -eux
          Rscript tools/crosscheck/gen_fixtures.R
          git diff --exit-code -- tools/crosscheck/fixtures \
            || { echo "::error::tools/crosscheck/fixtures is stale — re-run 'Rscript tools/crosscheck/gen_fixtures.R' and commit"; exit 1; }

  # ------------------------------------------------------------------
  # R <-> Python-mirror model cross-check (issue #27, part C) — the REQUIRED numeric guard.
  #
  # The two implementations of the physiology model (R simulate_tanks and Monkey C
  # TankModel.stepModel) must stay numerically equal. A Python line-for-line mirror of the
  # Monkey C step is driven through the same power traces the R reference was frozen on
  # (tools/crosscheck/fixtures/) and asserted equal per second within 0.1 J (~9 orders above
  # the ~1e-11 J float-noise floor; catches sub-percent coefficient drift). This directly
  # guards R == the mirror; Monkey C is guarded TRANSITIVELY (the mirror is a faithful port —
  # the residual mirror<->compiled-Monkey-C gap is tracked in #61). Runs with NO Connect IQ
  # SDK / simulator, so it is deterministic and fast — which is why it, not the best-effort
  # on-device `ciq-test`, is the enforced equality gate (in ci-required). Pure stdlib Python;
  # no pip install. Fixture freshness is enforced by the r-test job (regenerate-and-diff), so
  # an R-side model change with stale fixtures fails loudly instead of false-passing here.
  # ------------------------------------------------------------------
  model-parity:
    name: Model parity (R vs Python mirror)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - name: Cross-check the Python mirror against the R reference fixtures
        run: python3 tools/crosscheck/test_parity.py

  # ------------------------------------------------------------------
  # Manifest app-id sanity — catches placeholder / malformed ids (a packaging
  # bug that still compiles and passes tests, so `test` can't see it).
  # ------------------------------------------------------------------
  manifest-lint:
    name: Manifest app-id lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - run: ./scripts/check_manifest_appid.sh connectiq/manifest.xml
      # #42: CP/W' must keep the sentinel 0 default or the SET CP/W' guard silently re-inerts.
      # Enforced here (a required job) because the headless (:test) suite segfault-skips in CI.
      - run: ./scripts/check_settings_defaults.sh connectiq/resources/settings/properties.xml

  # ------------------------------------------------------------------
  # Stable required-check aggregator. Require ONLY this in branch protection so
  # adding/removing jobs later doesn't churn the protected list. `test` compiles
  # clean on both edge1050 and fenix6pro, so it's promoted into the gate here.
  # ------------------------------------------------------------------
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ test, r-lint, r-test, manifest-lint, model-parity ]
    steps:
      - run: echo "required checks passed"
